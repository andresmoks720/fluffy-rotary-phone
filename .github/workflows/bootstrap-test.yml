name: bootstrap-test

on:
  push:
  pull_request:

jobs:
  clean-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies (clean)
        run: pnpm install --frozen-lockfile
      - name: Run workspace tests
        run: pnpm test
